# Agent Nexus - Nginx Config
# Установка: sudo cp nginx.conf /etc/nginx/sites-available/nexus
# Активация: sudo ln -s /etc/nginx/sites-available/nexus /etc/nginx/sites-enabled/

server {
    listen ${NEXUS_NGINX_HTTP_PORT};
    server_name ${NEXUS_TLS_SERVER_NAME};
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen ${NEXUS_NGINX_HTTPS_PORT} ssl http2;
    server_name ${NEXUS_TLS_SERVER_NAME};
    
    # SSL (настроить свои сертификаты)
    ssl_certificate /etc/nginx/ssl/nexus.crt;
    ssl_certificate_key /etc/nginx/ssl/nexus.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=${NEXUS_HSTS_MAX_AGE_SECONDS}; includeSubDomains" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    
    # Backend proxy
    location / {
        proxy_pass http://127.0.0.1:${NEXUS_BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout ${NEXUS_PROXY_CONNECT_TIMEOUT_SECONDS}s;
        proxy_send_timeout ${NEXUS_PROXY_SEND_TIMEOUT_SECONDS}s;
        proxy_read_timeout ${NEXUS_PROXY_READ_TIMEOUT_SECONDS}s;
    }
    
    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:${NEXUS_BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout ${NEXUS_WEBSOCKET_READ_TIMEOUT_SECONDS}s;
    }
    
    # Static files (Next.js)
    location /_next/static {
        alias /home/pets/temp/sessions_landing/frontend/.next/static;
        expires ${NEXUS_STATIC_CACHE_DAYS}d;
        add_header Cache-Control "public, immutable";
    }
    
    # Logs
    access_log /var/log/nginx/nexus.access.log;
    error_log /var/log/nginx/nexus.error.log;
}
