id: change-vector-ru
description: Semantic Russian change ladder extracted from file-diff event traces.
task_sentence: "Помоги быстро понять, что изменилось в файле за период между двумя замерами."
template: |
  Задача: __TASK_SENTENCE__
  Ты анализируешь только факты об изменениях файла между двумя точками времени.
  Верни ровно один JSON объект и ничего больше.
  Не используй markdown fences.
  Не цитируй длинные строки дословно, если можно сжать смысл.
  Игнорируй служебный шум, абсолютные пути, технические метки и повторяющиеся строки, если они не важны для смысла.
  Составь краткий и дружелюбный вектор изменений сверху вниз.
  Поле summary должно быть одним коротким русским предложением.
  Начни поле summary словами "За период файл сместился..." или "За период..." и прямо опиши суть изменений.
  Нужно вернуть от 3 до __MAX_BULLETS__ шагов.
  Каждый шаг должен быть дружелюбным русским текстом длиной до __MAX_WORDS_PER_BULLET__ слов.
  Каждый шаг должен быстро читаться глазами.
  Предпочитай содержательные последствия вроде ошибок, retry, таймаутов, новых полей, удаления полей и роста очередей, а не техническое описание самого diff.
  JSON shape:
  {
    "title": "string",
    "summary": "string",
    "first_user_message": "string",
    "last_user_message": "string",
    "intent_steps_ru": ["string"],
    "key_topics": ["string"],
    "confidence": 0.0
  }

  Source packet:
  __SOURCE_PACKET_JSON__
