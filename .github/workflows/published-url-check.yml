name: Published URL Check

on:
  workflow_dispatch:
    inputs:
      public_url:
        description: Override published URL for this run
        required: false
        type: string
  workflow_call:
    inputs:
      public_url:
        description: Published URL to check
        required: false
        type: string
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: published-url-check
  cancel-in-progress: true

jobs:
  check:
    name: External Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
        working-directory: frontend
    env:
      DEFAULT_PUBLIC_URL: http://107.174.231.22:8888
      NEXUS_PLAYWRIGHT_TIMEOUT_MS: 30000
      NEXUS_PLAYWRIGHT_HYDRATION_WAIT_MS: 4000
      NEXUS_E2E_PASSWORD: ${{ secrets.NEXUS_E2E_PASSWORD || vars.NEXUS_E2E_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Resolve published URL
        id: url
        working-directory: .
        run: |
          if [ -n "${{ inputs.public_url }}" ]; then
            echo "public_url=${{ inputs.public_url }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.NEXUS_PUBLIC_URL }}" ]; then
            echo "public_url=${{ vars.NEXUS_PUBLIC_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "public_url=${DEFAULT_PUBLIC_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check published URL with Playwright smoke
        env:
          NEXUS_PUBLIC_URL: ${{ steps.url.outputs.public_url }}
        run: npm run check:published -- "$NEXUS_PUBLIC_URL"

      - name: Run full published URL E2E suite
        env:
          NEXUS_PUBLIC_URL: ${{ steps.url.outputs.public_url }}
        run: npm run test:e2e:published

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-published-url-artifacts
          if-no-files-found: ignore
          path: |
            frontend/playwright-report
            frontend/test-results
